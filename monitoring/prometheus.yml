global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scraping Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scraping FastAPI Backend metrics endpoint
  - job_name: 'nima-backend'
    metrics_path: '/api/v1/health' # FastAPI health check returning stats, or /metrics if prometheus-fastapi-instrumentator is used
    static_configs:
      - targets: ['backend:8000']
