version: '3.8'

services:
  # FastAPI Backend Service
  backend:
    build:
      context: ./nima_ai_backend
      dockerfile: Dockerfile
    container_name: nima-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - MONGO_URI=mongodb://${MONGO_USER:-admin}:${MONGO_PASS:-secret}@mongodb:27017/nima_db?authSource=admin
      - REDIS_URI=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-super-secret-jwt-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENTRY_DSN=${SENTRY_DSN_BACKEND}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY}
    depends_on:
      - mongodb
      - redis
    volumes:
      - backend-logs:/app/logs
    networks:
      - nima-network

  # Next.js Frontend Service
  frontend:
    build:
      context: ./nima_ai_frontend
      dockerfile: Dockerfile
    container_name: nima-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - SENTRY_DSN=${SENTRY_DSN_FRONTEND}
      - NEXT_PUBLIC_POSTHOG_KEY=${POSTHOG_API_KEY}
      - NEXT_PUBLIC_POSTHOG_HOST=https://app.posthog.com
    depends_on:
      - backend
    networks:
      - nima-network

  # Local MongoDB dev container (Production binds to MongoDB Atlas directly)
  mongodb:
    image: mongo:6.0
    container_name: nima-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASS:-secret}
    volumes:
      - mongo-data:/data/db
    networks:
      - nima-network

  # Local Redis dev container (Production binds to Redis Cloud directly)
  redis:
    image: redis:7-alpine
    container_name: nima-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - nima-network

  # Metrics Ingestion
  prometheus:
    image: prom/prometheus:latest
    container_name: nima-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    networks:
      - nima-network

  # Dashboards Visualizer
  grafana:
    image: grafana/grafana:latest
    container_name: nima-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASS:-admin}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - nima-network

volumes:
  backend-logs:
  mongo-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  nima-network:
    driver: bridge
